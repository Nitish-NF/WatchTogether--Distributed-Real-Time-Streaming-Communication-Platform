apiVersion: apps/v1
kind: Deployment
metadata:
  name: wt-frontend
  labels:
    app: wt-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wt-frontend
  template:
    metadata:
      labels:
        app: wt-frontend
    spec:
      containers:
        - name: frontend
          image: watchtogether/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: wt-frontend-service
spec:
  selector:
    app: wt-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wt-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "10g"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  rules:
    - host: yourdomain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: wt-backend-service
                port:
                  number: 5000
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: wt-backend-service
                port:
                  number: 5000
          - path: /hls
            pathType: Prefix
            backend:
              service:
                name: wt-stream-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wt-frontend-service
                port:
                  number: 80