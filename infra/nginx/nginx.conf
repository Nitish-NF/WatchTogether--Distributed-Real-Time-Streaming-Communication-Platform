worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';

  access_log /var/log/nginx/access.log main;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # ── Upstreams ────────────────────────────────────────────
  upstream frontend { server frontend:80; }
  upstream backend  { server backend:5000; }
  upstream stream   { server stream:8080; }

  # WebRTC uses network_mode: host so it is NOT on Docker network.
  # Reach it via host.docker.internal (set by extra_hosts in compose).
  upstream webrtc   { server host.docker.internal:4000; }

  # ── Main server ──────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options      "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                    always;
    add_header X-XSS-Protection     "1; mode=block"                always;
    add_header Referrer-Policy      "strict-origin-when-cross-origin" always;

    # ── Frontend (React SPA) ──────────────────────────────
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Backend API ───────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://backend;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # Auth — stricter rate limit (more specific, takes priority)
    location /api/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://backend;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # ── Socket.IO (backend WebSocket) ────────────────────
    location /socket.io/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # ── WebRTC signaling ──────────────────────────────────
    location /webrtc/ {
      proxy_pass http://webrtc/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # ── HLS streaming ─────────────────────────────────────
    location /hls/ {
      proxy_pass http://stream/hls/;
      proxy_set_header Host $host;
      proxy_buffering   on;
      proxy_buffer_size 128k;
      proxy_buffers     4 256k;

      # CORS for video players
      add_header Access-Control-Allow-Origin  "*"          always;
      add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

      # Cache TS segments at browser level
      location ~* \.ts$ {
        proxy_pass http://stream;
        add_header Cache-Control "public, max-age=86400, immutable";
      }

      # Never cache playlists — they change as segments are added
      location ~* \.m3u8$ {
        proxy_pass http://stream;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
      }
    }

    # ── Health check ──────────────────────────────────────
    location /health {
      proxy_pass http://backend/health;
      access_log off;
    }
  }
}